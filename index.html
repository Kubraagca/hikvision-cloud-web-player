<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hikvision Cloud Izleme Paneli</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.15/hls.min.js"></script>
<script src="/sdk/dist/jquery-1.12.1.min.js"></script>
<script src="/sdk/dist/jquery.cookie.js"></script>
<script src="/sdk/dist/cryptico.min.js"></script>
<script src="/sdk/dist/uuid.js"></script>
<script src="/sdk/dist/jsPlugin-3.0.0.min.js"></script>
<style>
  :root {
    --bg: #f3efe7;
    --panel: #fffaf1;
    --border: #d8cfc0;
    --text: #231f1a;
    --muted: #766c60;
    --accent: #005f73;
    --ok: #22c55e;
    --off: #6b7280;
    --err: #ef4444;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Georgia, "Segoe UI", serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, #fff4d6 0, transparent 32%),
      linear-gradient(180deg, #f7f1e6 0%, #efe6d6 100%);
  }

  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 250, 241, 0.82);
    backdrop-filter: blur(8px);
  }

  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
  }

  header .sub {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
  }

  button,
  select {
    border: 1px solid var(--border);
    background: white;
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
  }

  button {
    cursor: pointer;
  }

  main {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 73px);
  }

  @media (max-width: 760px) {
    main {
      grid-template-columns: 1fr;
    }
  }

  #camera-list {
    padding: 14px;
    border-right: 1px solid var(--border);
    background: rgba(255, 250, 241, 0.6);
    overflow-y: auto;
  }

  .health,
  .toolbar,
  .cam-item,
  #video-wrap {
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.72);
  }

  .health,
  .toolbar {
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .health strong {
    color: var(--text);
  }

  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .placeholder {
    color: var(--muted);
    text-align: center;
    padding: 40px 12px;
    font-size: 13px;
  }

  .cam-item {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .cam-item:hover {
    background: rgba(255, 255, 255, 0.95);
  }

  .cam-item.active {
    outline: 1px solid var(--accent);
    background: rgba(255, 255, 255, 0.98);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.on { background: var(--ok); }
  .dot.off { background: var(--off); }

  .cam-name {
    flex: 1;
  }

  #stage {
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video-wrap {
    width: 100%;
    max-width: 980px;
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 22px 60px rgba(70, 50, 20, 0.12);
  }

  #sdk-player {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    background: #3d3b39;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  video {
    width: 100%;
    aspect-ratio: 16 / 9;
    display: block;
    border-radius: 12px;
    background: black;
    margin-top: 14px;
  }

  .status-line {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }

  .meta {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .meta-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.58);
    font-size: 13px;
  }

  .meta-card span {
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Hikvision Cloud Izleme Paneli</h1>
    <div class="sub">Kameralari listele ve Hikvision JSDecoder SDK ile cloud canli yayina hazirla.</div>
  </div>
  <button id="refresh-btn">Listeyi yenile</button>
</header>

<main>
  <aside id="camera-list">
    <div class="health" id="health-box">Baglanti kontrol ediliyor...</div>
    <div class="toolbar">
      <label for="quality-select">Kalite</label>
      <select id="quality-select">
        <option value="1">HD</option>
        <option value="2">Akici</option>
      </select>
      <label for="code-input">Sifre Kodu</label>
      <input id="code-input" type="text" placeholder="Kamera sifre kodu" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;" />
    </div>
    <div class="placeholder" id="camera-placeholder">Kameralar yukleniyor...</div>
  </aside>

  <section id="stage">
    <div id="video-wrap">
      <div id="sdk-player"></div>
      <video id="player" controls muted playsinline></video>
      <div class="status-line">
        <span id="status-text">Bir kamera secin</span>
        <span id="expire-text"></span>
      </div>
      <div id="sdk-box" class="health" style="margin-top:14px;">
        SDK durumu kontrol ediliyor...
      </div>
      <div class="meta">
        <div class="meta-card">
          <span>Kamera</span>
          <strong id="camera-meta">Secim yok</strong>
        </div>
        <div class="meta-card">
          <span>Protokol</span>
          <strong id="protocol-meta">EZOPEN / SDK</strong>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  const listEl = document.getElementById("camera-list");
  const placeholderEl = document.getElementById("camera-placeholder");
  const videoEl = document.getElementById("player");
  const statusEl = document.getElementById("status-text");
  const expireEl = document.getElementById("expire-text");
  const healthEl = document.getElementById("health-box");
  const qualityEl = document.getElementById("quality-select");
  const codeEl = document.getElementById("code-input");
  const cameraMetaEl = document.getElementById("camera-meta");
  const protocolMetaEl = document.getElementById("protocol-meta");
  const sdkBoxEl = document.getElementById("sdk-box");
  const sdkPlayerEl = document.getElementById("sdk-player");
  let hls = null;
  let activeCard = null;
  let sdkConfig = null;
  let sdkPlayer = null;
  let sdkReady = false;
  let sdkWindowIndex = 0;

  async function loadHealth() {
    try {
      const res = await fetch("/api/health");
      const data = await res.json();
      if (!data.ok) {
        healthEl.innerHTML = `<strong>Durum:</strong> hazir degil<br>${data.error || "Kimlik bilgileri eksik."}<br><strong>SDK:</strong> ${data.sdkInstalled ? "kurulu" : "eksik"}`;
        return;
      }

      healthEl.innerHTML = `<strong>Durum:</strong> bagli<br><strong>Area domain:</strong> ${data.areaDomain || "Henuz alinmadi"}<br><strong>SDK:</strong> ${data.sdkInstalled ? "kurulu" : "eksik"}`;
    } catch (err) {
      healthEl.innerHTML = `<strong>Durum:</strong> hata<br>${err.message}`;
    }
  }

  async function loadSdkConfig() {
    try {
      const res = await fetch("/api/sdk-config");
      const data = await res.json();

      if (!res.ok) {
        sdkBoxEl.innerHTML = `<strong>SDK:</strong> hazir degil<br>${data.error || "SDK config alinamadi."}`;
        return;
      }

      sdkConfig = data;
      sdkBoxEl.innerHTML = `<strong>SDK modu:</strong> ${data.sdkInstalled ? "hazir" : "eksik"}<br><strong>Beklenen klasor:</strong> ${data.sdkBasePath}<br>${data.note}`;
      await initSdkPlayer();
    } catch (err) {
      sdkBoxEl.innerHTML = `<strong>SDK:</strong> hata<br>${err.message}`;
    }
  }

  async function initSdkPlayer() {
    if (sdkReady || !sdkConfig?.sdkInstalled) {
      return;
    }

    if (typeof JSPlugin === "undefined") {
      sdkBoxEl.innerHTML = `<strong>SDK:</strong> yuklenemedi<br>jsPlugin-3.0.0.min.js bulunamadi veya tarayici tarafinda acilmadi.`;
      return;
    }

    const width = Math.max(Math.floor(sdkPlayerEl.clientWidth || 960), 640);
    const height = Math.max(Math.floor(width * 9 / 16), 360);

    sdkPlayer = new JSPlugin({
      szId: "sdk-player",
      iWidth: width,
      iHeight: height,
      iMaxSplit: 1,
      iCurrentSplit: 1,
      szBasePath: "/sdk/dist",
      oStyle: {
        border: "#343434",
        borderSelect: "#005f73",
        background: "#3d3b39"
      }
    });

    try {
      await sdkPlayer.JS_CreateWnd("sdk-player", width, height);
      sdkReady = true;
      sdkBoxEl.innerHTML = `<strong>SDK modu:</strong> aktif<br><strong>Base path:</strong> /sdk/dist<br>JSDecoder oynatici hazirlandi.`;
    } catch (err) {
      sdkBoxEl.innerHTML = `<strong>SDK:</strong> pencere olusturulamadi<br>${err.message}`;
    }
  }

  async function loadCameras() {
    listEl.querySelectorAll(".cam-item").forEach((el) => el.remove());
    placeholderEl.style.display = "block";
    placeholderEl.textContent = "Kameralar yukleniyor...";
    placeholderEl.style.color = "var(--muted)";

    try {
      const res = await fetch("/api/cameras");
      const data = await res.json();

      if (!res.ok) {
        placeholderEl.textContent = data.error || "Kamera listesi alinamadi";
        placeholderEl.style.color = "var(--err)";
        return;
      }

      if (!data.cameras || data.cameras.length === 0) {
        placeholderEl.textContent = "Kamera bulunamadi";
        return;
      }

      placeholderEl.style.display = "none";

      data.cameras.forEach((cam) => {
        const card = document.createElement("div");
        card.className = "cam-item";
        card.innerHTML = `
          <span class="dot ${cam.online ? "on" : "off"}"></span>
          <span class="cam-name">${cam.name}</span>
        `;
        card.addEventListener("click", () => selectCamera(cam, card));
        listEl.appendChild(card);
      });
    } catch (err) {
      placeholderEl.textContent = err.message;
      placeholderEl.style.color = "var(--err)";
    }
  }

  async function selectCamera(cam, card) {
    if (activeCard) activeCard.classList.remove("active");
    card.classList.add("active");
    activeCard = card;
    cameraMetaEl.textContent = cam.name;
    statusEl.textContent = `${cam.name} - yayin adresi aliniyor...`;
    expireEl.textContent = "";

    if (!cam.deviceSerial) {
      statusEl.textContent = "Bu kamerada deviceSerial bilgisi yok.";
      return;
    }

    try {
      const params = new URLSearchParams({
        resourceId: cam.resourceId,
        deviceSerial: cam.deviceSerial,
        quality: qualityEl.value,
      });
      if (codeEl.value.trim()) {
        params.set("code", codeEl.value.trim());
      }

      const res = await fetch(`/api/stream?${params}`);
      const data = await res.json();

      if (!res.ok) {
        statusEl.textContent = `Hata: ${data.error || "Yayin alinamadi"}`;
        console.error("stream error", data);
        return;
      }

      protocolMetaEl.textContent =
        data.protocol === 1 ? "EZOPEN / SDK" :
        data.protocol === 2 ? "HLS" :
        data.protocol === 3 ? "RTMP" :
        `Protocol ${data.protocol}`;
      const playedWithSdk = await playSdkUrl(data.url, codeEl.value.trim());
      if (playedWithSdk) {
        statusEl.textContent = `${cam.name} - JSDecoder SDK ile oynatiliyor.`;
      } else {
        if (data.protocol === 2) {
          playHls(data.url);
          statusEl.textContent = `${cam.name} - HLS fallback bulundu.`;
        } else {
          statusEl.textContent = `${cam.name} - URL alindi ama SDK oynatma basarisiz oldu.`;
        }
      }

      if (data.expireTime) {
        const expires = new Date(data.expireTime);
        expireEl.textContent = `Link gecerlilik: ${expires.toLocaleTimeString("tr-TR")}`;
      }
    } catch (err) {
      statusEl.textContent = `Hata: ${err.message}`;
    }
  }

  async function playSdkUrl(url, secretKey) {
    if (!sdkReady || !sdkPlayer || !url) {
      return false;
    }

    try {
      if (secretKey) {
        sdkPlayer.JS_SetSecretKey(sdkWindowIndex, secretKey);
      }

      await sdkPlayer.JS_Play(
        url,
        {
          playURL: url,
          auth: "",
          mode: "media",
          token: ""
        },
        sdkWindowIndex
      );

      protocolMetaEl.textContent = "EZOPEN / JSDecoder";
      return true;
    } catch (err) {
      console.error("sdk play failed", err);
      sdkBoxEl.innerHTML = `<strong>SDK:</strong> oynatma basarisiz<br>${err.message}`;
      return false;
    }
  }

  function playHls(url) {
    if (hls) {
      hls.destroy();
      hls = null;
    }

    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(videoEl);
      hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
      return;
    }

    if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
      videoEl.src = url;
      videoEl.play().catch(() => {});
      return;
    }

    statusEl.textContent = "Tarayiciniz HLS oynatmayi desteklemiyor.";
  }

  document.getElementById("refresh-btn").addEventListener("click", loadCameras);
  window.addEventListener("resize", () => {
    if (sdkPlayer && typeof sdkPlayer.JS_Resize === "function") {
      sdkPlayer.JS_Resize();
    }
  });
  loadHealth();
  loadSdkConfig();
  loadCameras();
</script>
</body>
</html>
